<style>
  :root{
    --bg: #1C1B1F;
    --bg-raised: #242228;
    --bg-card: #2A282F;
    --ink: #EDEAE3;
    --ink-dim: #A39E96;
    --ink-faint: #6E6A65;
    --red: #D14B3D;
    --red-dim: #8A3329;
    --gold: #C9A04E;
    --gold-dim: #8A6E36;
    --hairline: #3A373E;
    --switch: #E60012;
    --switch2: #FF5C5C;
    --xbox: #107C10;
    --pc: #4E8FD1;
    --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
    --font-data: 'Roboto Condensed', 'Arial Narrow', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @font-face {
    font-family: 'Fraunces';
    src: local('Georgia');
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
    overscroll-behavior-y: none;
  }

  /* ---------- Header ---------- */
  header.top {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: calc(18px + env(safe-area-inset-top)) 18px 10px;
  }
  .brand {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .brand h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .brand h1 em {
    font-style: italic;
    color: var(--red);
  }
  .brand .sticker {
    font-family: var(--font-data);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    text-transform: uppercase;
    border: 1px solid var(--hairline);
    border-radius: 100px;
    padding: 4px 10px;
  }

  /* ---------- Tabs ---------- */
  nav.tabs {
    display: flex; gap: 6px;
    margin-top: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--ink-dim);
    font-family: var(--font-data);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  nav.tabs button.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  main { padding: 16px 18px 24px; }

  /* ---------- Filter row ---------- */
  .filterbar {
    display: flex; gap: 8px; margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filterbar select, .filterbar input[type="text"] {
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    flex: 1 1 auto;
    min-width: 90px;
  }
  .filterbar input[type="text"] { flex: 2 1 auto; }

  /* ---------- Shelf grid ---------- */
  .shelf {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (min-width: 480px) {
    .shelf { grid-template-columns: repeat(4, 1fr); }
  }
  .spine {
    position: relative;
    background: var(--bg-card);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 3/4;
    cursor: pointer;
    border: 1px solid var(--hairline);
    display: flex;
    flex-direction: column;
    transition: transform 0.12s ease;
  }
  .spine:active { transform: scale(0.96); }
  .spine img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; inset: 0;
  }
  .spine .badge-fallback {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
  }
  .console-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .spine .badge-fallback .console-dot { width: 16px; height: 16px; }
  .spine .title-fallback {
    font-family: var(--font-display);
    font-size: 12px;
    text-align: center;
    line-height: 1.25;
    color: var(--ink-dim);
    padding: 0 4px;
  }
  .spine .complete-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    z-index: 2;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.3);
  }
  .spine .console-tag {
    position: absolute;
    top: 6px; left: 6px;
    width: 8px; height: 8px;
    border-radius: 50%;
    z-index: 2;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-family: var(--font-display);
    font-size: 16px;
  }

  /* ---------- Hardware list ---------- */
  .hw-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .hw-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;

<header class="top">
  <div class="brand">

    <span class="sticker" id="gameCount">0 games</span>

    <button class="active" data-tab="library">Library</button>
    <button data-tab="backlog">Backlog</button>
    <button data-tab="hardware">Hardware</button>
    <button data-tab="dashboard">Stats</button>
  </nav>
</header>

<main>

        <option value="cost-desc">Most expensive</option>
        <option value="name-asc">Name A–Z</option>
      </select>
    </div>
    <div class="shelf" id="shelfGrid"></div>
  </div>

  <!-- BACKLOG TAB -->
  <div id="tab-backlog" style="display:none">

      <input type="text" id="backlogSearch" placeholder="Search your backlog…">
    </div>
    <div class="shelf" id="backlogGrid"></div>
  </div>

  <!-- HARDWARE TAB -->

  <!-- DASHBOARD TAB -->

    <div class="section-title">Spend by year</div>

  </div>
</main>

function loadData(){
  const stored = localStorage.getItem('shelfLibrary');
  if (stored) {
    try { return JSON.parse(stored); } catch(e) { /* fall through to seed */ }
  }
  const seeded = [...SEED_DATA, ...SEED_HARDWARE].map(g => ({...g, id: uid()}));
  saveData(seeded);
  return seeded;
}
function saveData(data){
  localStorage.setItem('shelfLibrary', JSON.stringify(data));
}

/* ===================== HELPERS ===================== */

function fmtMoney(n){
  return '$' + (Math.round(n*100)/100).toLocaleString('en-AU', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function cph(game){
  if (!game.hours || game.hours <= 0) return null;
  return game.cost / game.hours;
}
function consoleColor(c){
  return CONSOLE_COLORS[c] || CONSOLE_COLORS["Other"];
}
function isGameType(g){ return g.type === 'Game'; }
function isHardwareType(g){ return g.type !== 'Game'; }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ===================== RENDER: SHELF ===================== */

function populateConsoleFilter(){
  const sel = document.getElementById('consoleFilter');
  const consoles = [...new Set(library.map(g => g.console))].sort();
  sel.innerHTML = '<option value="">All consoles</option>' + consoles.map(c => `<option value="${c}">${c}</option>`).join('');
}

function getFilteredSorted(){
  const search = document.getElementById('searchInput').value.toLowerCase();
  const consoleVal = document.getElementById('consoleFilter').value;
  const sortVal = document.getElementById('sortSelect').value;

  let games = library.filter(isGameType);
  if (search) games = games.filter(g => g.name.toLowerCase().includes(search));
  if (consoleVal) games = games.filter(g => g.console === consoleVal);

  games = [...games];
  switch(sortVal){
    case 'date-desc': games.sort((a,b)=> (b.date||'').localeCompare(a.date||'')); break;
    case 'date-asc': games.sort((a,b)=> (a.date||'').localeCompare(b.date||'')); break;
    case 'cph-asc': games.sort((a,b)=> {
      const ca = cph(a), cb = cph(b);
      if (ca === null) return 1; if (cb === null) return -1;
      return ca - cb;
    }); break;
    case 'cph-desc': games.sort((a,b)=> {
      const ca = cph(a), cb = cph(b);
      if (ca === null) return 1; if (cb === null) return -1;
      return cb - ca;
    }); break;
    case 'hours-desc': games.sort((a,b)=> (b.hours||0)-(a.hours||0)); break;
    case 'cost-desc': games.sort((a,b)=> (b.cost||0)-(a.cost||0)); break;
    case 'name-asc': games.sort((a,b)=> a.name.localeCompare(b.name)); break;
  }
  return games;
}

function renderSpine(g){
  const color = consoleColor(g.console);
  const cover = g.coverUrl ? `<img src="${g.coverUrl}" alt="" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
  const fallbackDisplay = g.coverUrl ? 'display:none;' : 'display:flex;';
  return `
  <div class="spine" data-id="${g.id}">
    ${g.completionist ? '<div class="complete-dot" title="100% completionist"></div>' : ''}
    <div class="console-tag" style="background:${color}"></div>
    ${cover}
    <div class="badge-fallback" style="${fallbackDisplay}">
      <div class="console-dot" style="background:${color}"></div>
      <div class="title-fallback">${g.name}</div>
    </div>
  </div>`;
}

function renderShelf(){
  const grid = document.getElementById('shelfGrid');
  const games = getFilteredSorted();
  document.getElementById('gameCount').textContent = `${library.filter(isGameType).length} games`;
  if (games.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No games match that search.<br>Try a different filter.</div>`;
    return;
  }
  grid.innerHTML = games.map(renderSpine).join('');
  grid.querySelectorAll('.spine').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

function renderBacklog(){
  const grid = document.getElementById('backlogGrid');
  const search = document.getElementById('backlogSearch').value.toLowerCase();
  let games = library.filter(g => isGameType(g) && (g.completion || 0) === 0);
  if (search) games = games.filter(g => g.name.toLowerCase().includes(search));
  games.sort((a,b)=> (b.cost||0)-(a.cost||0));
  if (games.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">Backlog's clear.<br>Nothing sitting at 0%.</div>`;
    return;
  }
  grid.innerHTML = games.map(renderSpine).join('');
  grid.querySelectorAll('.spine').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

function renderHwRow(g){
  const color = consoleColor(g.console);
  return `
  <div class="hw-row" data-id="${g.id}">
    <div class="hw-dot" style="background:${color}"></div>
    <div class="hw-info">
      <div class="hw-name">${g.name}</div>
      <div class="hw-sub">${g.console} · ${g.date}${g.comments ? ' · ' + g.comments : ''}</div>
      <div class="hw-meta">
        <span class="hw-type-pill">${g.type}</span>
        <span class="hw-cost">${fmtMoney(g.cost)}</span>
      </div>
    </div>
  </div>`;
}

function renderHardware(){
  const list = document.getElementById('hardwareList');
  const search = document.getElementById('hardwareSearch').value.toLowerCase();
  const typeVal = document.getElementById('hardwareTypeFilter').value;
  let items = library.filter(isHardwareType);
  if (search) items = items.filter(g => g.name.toLowerCase().includes(search));
  if (typeVal) items = items.filter(g => g.type === typeVal);
  items = [...items].sort((a,b)=> (b.cost||0)-(a.cost||0));

  if (items.length === 0){
    list.innerHTML = `<div class="empty-state">Nothing here yet.<br>Add a console or accessory below.</div>`;
    return;
  }
  list.innerHTML = items.map(renderHwRow).join('');
  list.querySelectorAll('.hw-row').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
}

/* ===================== RENDER: DASHBOARD ===================== */

function renderDashboard(){
  const games = library.filter(isGameType);
  const hardware = library.filter(isHardwareType);
  const all = library;
  const gamesSpend = games.reduce((s,g)=> s + (g.cost||0), 0);
  const hardwareSpend = hardware.reduce((s,g)=> s + (g.cost||0), 0);
  const totalSpend = gamesSpend + hardwareSpend;
  const totalHours = games.reduce((s,g)=> s + (g.hours||0), 0);
  const playedGames = games.filter(g => g.hours > 0);
  const avgCph = playedGames.length ? playedGames.reduce((s,g)=> s + cph(g), 0) / playedGames.length : 0;
  const completionistCount = games.filter(g => g.completionist).length;
  const backlogCount = games.filter(g => (g.completion||0) === 0).length;
  const fullCompleteCount = games.filter(g => (g.completion||0) === 100).length;

  document.getElementById('spendSplit').innerHTML = `
    <div class="cell"><span class="v">${fmtMoney(gamesSpend)}</span><span class="l">Games</span></div>
    <div class="cell"><span class="v">${fmtMoney(hardwareSpend)}</span><span class="l">Hardware & other</span></div>
    <div class="cell combined"><span class="v">${fmtMoney(totalSpend)}</span><span class="l">Combined total</span></div>
  `;

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><span class="num">${totalHours.toLocaleString()}</span><span class="label">Hours played</span></div>
    <div class="stat-card"><span class="num">${fmtMoney(avgCph)}</span><span class="label">Avg cost / hour</span></div>
    <div class="stat-card"><span class="num">${games.length}</span><span class="label">Games owned</span></div>
    <div class="stat-card"><span class="num">${fullCompleteCount}</span><span class="label">100% complete</span></div>
    <div class="stat-card"><span class="num">${backlogCount}</span><span class="label">Untouched (backlog)</span></div>
    <div class="stat-card"><span class="num">${completionistCount}</span><span class="label">True completionist</span></div>
  `;

  // Spend by year
  const byYear = {};
  all.forEach(g => { const y = g.date || 'Unknown'; byYear[y] = (byYear[y]||0) + (g.cost||0); });
  const years = Object.keys(byYear).sort();
  const maxYear = Math.max(...Object.values(byYear), 1);
  document.getElementById('yearBars').innerHTML = years.map(y => `
    <div class="bar-row">
      <div class="bar-label">${y}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(byYear[y]/maxYear*100)}%"></div></div>
      <div class="bar-val">${fmtMoney(byYear[y])}</div>
    </div>`).join('');

  // Spend by console
  const byConsole = {};
  all.forEach(g => { byConsole[g.console] = (byConsole[g.console]||0) + (g.cost||0); });
  const consoles = Object.keys(byConsole).sort((a,b)=> byConsole[b]-byConsole[a]);
  const maxConsole = Math.max(...Object.values(byConsole), 1);
  document.getElementById('consoleBars').innerHTML = consoles.map(c => `
    <div class="bar-row">
      <div class="bar-label">${c}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(byConsole[c]/maxConsole*100)}%; background:${consoleColor(c)}"></div></div>
      <div class="bar-val">${fmtMoney(byConsole[c])}</div>
    </div>`).join('');

  // How acquired
  const byAcquire = {};
  games.forEach(g => { byAcquire[g.receivedAs] = (byAcquire[g.receivedAs]||0) + 1; });
  const acquireKeys = Object.keys(byAcquire).sort((a,b)=> byAcquire[b]-byAcquire[a]);
  const maxAcquire = Math.max(...Object.values(byAcquire), 1);
  document.getElementById('acquireBars').innerHTML = acquireKeys.map(k => `
    <div class="bar-row">
      <div class="bar-label">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(byAcquire[k]/maxAcquire*100)}%; background:var(--gold)"></div></div>
      <div class="bar-val">${byAcquire[k]} games</div>
    </div>`).join('');
}

/* ===================== DETAIL / EDIT PANEL ===================== */

function openPanel(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  activeGameId = null;
  editMode = false;
}

function openDetail(id){
  activeGameId = id;
  editMode = false;
  renderPanel();
  openPanel();
}

function openAddNew(defaultType){
  activeGameId = null;
  editMode = true;
  renderPanel(defaultType || 'Game');
  openPanel();
}

function renderPanel(defaultType){
  if (editMode) {
    renderEditForm(activeGameId ? library.find(g=>g.id===activeGameId) : null, defaultType);
  } else {
    renderDetailView(library.find(g=>g.id===activeGameId));
  }
}

function rankInsight(game){
  const games = library.filter(isGameType).filter(g => g.hours > 0);
  if (!game.hours || game.hours <= 0 || games.length < 3) return null;
  const sorted = [...games].sort((a,b)=> cph(a)-cph(b));
  const rank = sorted.findIndex(g => g.id === game.id) + 1;
  const totalSpend = library.reduce((s,g)=> s+(g.cost||0), 0);
  const pctOfSpend = totalSpend > 0 ? (game.cost/totalSpend*100) : 0;
  let line = `Ranked #${rank} of ${sorted.length} for value (cost per hour played).`;
  if (pctOfSpend >= 1) line += ` It's ${pctOfSpend.toFixed(1)}% of everything you've spent on this library.`;
  return line;
}

  if (!g) { closePanel(); return; }
  const color = consoleColor(g.console);

  const cphStr = c === null ? '—' : fmtMoney(c);

    : '';
  const fallbackDisplay = g.coverUrl ? 'display:none;' : 'display:flex;';
  const insight = rankInsight(g);

  document.getElementById('panelContent').innerHTML = `
    <div class="edit-toggle-row">
      <button class="icon-btn" id="editBtn">Edit</button>
    </div>
    <div class="detail-hero">
      <div class="detail-cover">
        ${cover}
        <div class="console-dot" style="background:${color}; ${g.coverUrl ? 'display:none' : ''}"></div>
      </div>
      <div>
        <div class="detail-name">${g.name}</div>
        <div class="detail-sub"><span class="console-dot" style="background:${color}"></span>${g.console} · ${g.type}</div>
        <div class="detail-sub">${g.format} · ${g.receivedAs}${g.purchasedBy ? ' ('+g.purchasedBy+')' : ''}</div>
      </div>
    </div>

      <div class="cell"><div class="v">${fmtMoney(g.cost)}</div><div class="l">Cost</div></div>

      <div class="cell"><div class="v">${cphStr}</div><div class="l">Per hour</div></div>
    </div>

    <div class="stat-strip">
      <div class="cell"><div class="v">${g.completion}%</div><div class="l">Completion</div></div>

      <div class="cell"><div class="v">${g.date}</div><div class="l">Year</div></div>

      <button class="btn btn-ghost" id="closeBtn">Close</button>

  `;

  document.getElementById('editBtn').addEventListener('click', () => { editMode = true; renderPanel(); });

    if (confirm(`Remove "${g.name}" from your library? This can't be undone.`)){

      saveData(library);
      closePanel();
      refreshCurrentTab();
      showToast('Removed from library');
    }
  });
}

function renderEditForm(g, defaultType){
  const isNew = !g;
  const d = g || {
    name:'', console:'Nintendo Switch', type: defaultType || 'Game', format:'Physical',
    receivedAs:'Purchased', purchasedBy:'Ben', comments:'', cost:0, hours:0,
    completion:0, completionist:false, date: new Date().getFullYear().toString(), coverUrl:''
  };

  document.getElementById('panelContent').innerHTML = `
    <div class="detail-name" style="margin:14px 0 16px">${isNew ? 'Add a game' : 'Edit ' + d.name}</div>

    <div class="field-group">
      <label>Cover image URL (optional)</label>
      <input type="text" id="f-cover" value="${d.coverUrl || ''}" placeholder="https://...">
    </div>

    <div class="field-group">
      <label>Name</label>
      <input type="text" id="f-name" value="${d.name}" placeholder="Game title">
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Console</label>
        <select id="f-console">
          ${Object.keys(CONSOLE_COLORS).map(c => `<option value="${c}" ${d.console===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label>Type</label>
        <select id="f-type">
          ${['Game','Console','Accessory','DLC','Subscription'].map(t => `<option value="${t}" ${d.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Format</label>
        <select id="f-format">
          <option value="Physical" ${d.format==='Physical'?'selected':''}>Physical</option>
          <option value="Digital" ${d.format==='Digital'?'selected':''}>Digital</option>
        </select>
      </div>
      <div class="field-group">
        <label>Year</label>
        <input type="text" id="f-date" value="${d.date}" placeholder="2026">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Received as</label>
        <select id="f-receivedas">
          <option value="Purchased" ${d.receivedAs==='Purchased'?'selected':''}>Purchased</option>
          <option value="Gift" ${d.receivedAs==='Gift'?'selected':''}>Gift</option>
          <option value="SxB" ${d.receivedAs==='SxB'?'selected':''}>SxB (shared)</option>
        </select>
      </div>
      <div class="field-group">
        <label>By / from</label>
        <input type="text" id="f-purchasedby" value="${d.purchasedBy || ''}" placeholder="Ben">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Cost (AUD)</label>
        <input type="number" id="f-cost" value="${d.cost}" step="0.01" inputmode="decimal">
      </div>
      <div class="field-group">
        <label>Hours played</label>
        <input type="number" id="f-hours" value="${d.hours}" step="1" inputmode="numeric">
      </div>
    </div>

    <div class="field-group">
      <label>Completion %</label>
      <input type="number" id="f-completion" value="${d.completion}" min="0" max="100" step="5" inputmode="numeric">
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="f-completionist" ${d.completionist ? 'checked' : ''}>
      <label for="f-completionist">100% completionist (platinum / full clear)</label>
    </div>

    <div class="field-group">
      <label>Comments</label>
      <textarea id="f-comments" placeholder="How you got it, sale details, notes…">${d.comments || ''}</textarea>
    </div>

    <div class="panel-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">${isNew ? 'Add to library' : 'Save changes'}</button>
    </div>
  `;

  document.getElementById('cancelBtn').addEventListener('click', () => {
    if (isNew) { closePanel(); } else { editMode = false; renderPanel(); }
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('Name it first'); return; }

    const updated = {
      id: isNew ? uid() : d.id,
      name,
      console: document.getElementById('f-console').value,
      type: document.getElementById('f-type').value,
      format: document.getElementById('f-format').value,
      receivedAs: document.getElementById('f-receivedas').value,
      purchasedBy: document.getElementById('f-purchasedby').value.trim(),
      comments: document.getElementById('f-comments').value.trim(),
      cost: parseFloat(document.getElementById('f-cost').value) || 0,
      hours: parseFloat(document.getElementById('f-hours').value) || 0,
      completion: Math.max(0, Math.min(100, parseInt(document.getElementById('f-completion').value) || 0)),
      completionist: document.getElementById('f-completionist').checked,
      date: document.getElementById('f-date').value.trim(),
      coverUrl: document.getElementById('f-cover').value.trim()
    };

    if (isNew) {
      library.push(updated);
    } else {
      const idx = library.findIndex(x => x.id === updated.id);
      library[idx] = updated;
    }
    saveData(library);
    activeGameId = updated.id;
    editMode = false;
    populateConsoleFilter();
    refreshCurrentTab();
    renderPanel();
    showToast(isNew ? 'Added to library' : 'Saved');
  });
}

/* ===================== TABS ===================== */

function refreshCurrentTab(){
  if (currentTab === 'library') renderShelf();
  else if (currentTab === 'backlog') renderBacklog();
  else if (currentTab === 'hardware') renderHardware();
  else if (currentTab === 'dashboard') renderDashboard();
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-library').style.display = tab === 'library' ? '' : 'none';
  document.getElementById('tab-backlog').style.display = tab === 'backlog' ? '' : 'none';
  document.getElementById('tab-hardware').style.display = tab === 'hardware' ? '' : 'none';
  document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? '' : 'none';
  const bottomNav = document.querySelector('.bottom-nav');
  bottomNav.style.display = (tab === 'dashboard' || tab === 'hardware') ? 'none' : 'flex';
  refreshCurrentTab();
}

/* ===================== EXPORT / IMPORT ===================== */

function exportBackup(){
  const blob = new Blob([JSON.stringify(library, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `library-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!Array.isArray(parsed)) throw new Error('not an array');
      if (!confirm(`Import ${parsed.length} entries? This replaces your current library.`)) return;
      library = parsed.map(g => ({...g, id: g.id || uid()}));
      saveData(library);
      populateConsoleFilter();
      refreshCurrentTab();
      showToast('Backup imported');
    } catch(err){
      showToast("Couldn't read that file");
    }
  };
  reader.readAsText(file);
}

/* ===================== INIT ===================== */

document.addEventListener('DOMContentLoaded', () => {
  populateConsoleFilter();
  renderShelf();

  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });

  document.getElementById('searchInput').addEventListener('input', renderShelf);
  document.getElementById('consoleFilter').addEventListener('change', renderShelf);
  document.getElementById('sortSelect').addEventListener('change', renderShelf);
  document.getElementById('backlogSearch').addEventListener('input', renderBacklog);
  document.getElementById('hardwareSearch').addEventListener('input', renderHardware);
  document.getElementById('hardwareTypeFilter').addEventListener('change', renderHardware);

  document.getElementById('addGameBtn').addEventListener('click', () => openAddNew('Game'));
  document.getElementById('addHardwareBtn').addEventListener('click', () => openAddNew('Console'));
  document.getElementById('overlay').addEventListener('click', closePanel);

  document.getElementById('exportBtn').addEventListener('click', exportBackup);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e) => {
    if (e.target.files[0]) importBackup(e.target.files[0]);
    e.target.value = '';
  });
});
</script>
